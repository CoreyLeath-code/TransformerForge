name: TransformerForge Enterprise CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: transformerforge-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-and-test:
    name: Python ${{ matrix.python-version }} Quality & Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Validate Python syntax
        run: python -m compileall -q src tests/test_api.py
      - name: Run Ruff correctness checks
        run: ruff check src tests/test_api.py --select E9,F63,F7,F82
      - name: Run API contract tests with coverage
        env:
          PYTHONPATH: .
          TRANSFORMERFORGE_LIGHTWEIGHT_MODE: "true"
        run: |
          pytest tests/test_api.py -v \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml \
            --junitxml=pytest-results.xml
      - name: Upload test evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-${{ matrix.python-version }}-evidence
          path: |
            coverage.xml
            pytest-results.xml
          if-no-files-found: warn

  container:
    name: Container Build & Health Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build --pull -t transformerforge:${{ github.sha }} .
      - name: Verify live health endpoint
        run: |
          docker run -d --rm --name transformerforge-ci -p 8000:8000 \
            -e TRANSFORMERFORGE_LIGHTWEIGHT_MODE=true \
            transformerforge:${{ github.sha }}
          trap 'docker logs transformerforge-ci || true; docker stop transformerforge-ci >/dev/null 2>&1 || true' EXIT
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8000/health; then
              echo "TransformerForge container is healthy."
              exit 0
            fi
            sleep 2
          done
          exit 1

  release-readiness:
    name: Release Readiness Contract
    if: always()
    needs: [quality-and-test, container]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify prerequisite jobs
        env:
          QUALITY_RESULT: ${{ needs.quality-and-test.result }}
          CONTAINER_RESULT: ${{ needs.container.result }}
        run: |
          echo "Quality result: ${QUALITY_RESULT}"
          echo "Container result: ${CONTAINER_RESULT}"
          test "${QUALITY_RESULT}" = "success"
          test "${CONTAINER_RESULT}" = "success"
      - name: Verify operational metadata
        run: |
          test -f README.md
          test -f LICENSE
          test -f SECURITY.md
          test -f CONTRIBUTING.md
          test -f CHANGELOG.md
          test -f Dockerfile
          test -f requirements-llm.txt
          test -f .github/dependabot.yml
          test -f docs/L6_DEPLOYMENT_HYGIENE.md
          echo "TransformerForge release-readiness contract passed."
